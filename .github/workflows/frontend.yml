name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          # This tells GitHub where to find the lockfile for caching
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Lint and Format Check (Biome)
        run: |
          cd frontend
          pnpm biome ci .

      - name: Build Check
        run: |
          cd frontend
          pnpm run build
